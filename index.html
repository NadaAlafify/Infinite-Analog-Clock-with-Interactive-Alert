<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ساعة العيد</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="all.css">
</head>
<body>
  <div class="clockSection">
    <div class="bigRing r1"></div>
    <div class="bigRing r2"></div>

    <p class="comment">مرر الماوس على الساعة</p>

    <div class="clock-surface">
      <div class="clock-face">
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div><div class="tick"></div>
        <div class="hand hand-hour"></div>
        <div class="hand hand-min"></div>
        <div class="hand hand-sec"></div>
        <div class="center-dot"></div>

        <div class="msg-overlay">
          <p class="msg-text">اقترب الوقت على حلول<br>شهر ذي الحجة المبارك</p>
          <p class="msg-line2">كل عام وأنتم بخير ✦</p>
        </div>
      </div>

      <div class="side-comment">
        <span class="side-arrow">←</span>
        <span class="side-text">مرر هنا</span>
      </div>
    </div>

    <p class="footer">Made by | Nada Alafify</p>
  </div>
</body>
</html>
